name: Android build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Fetch voxply-voice crate (Voxply-desktop)
        uses: actions/checkout@v6
        with:
          repository: Voxply/Voxply-desktop
          sparse-checkout: |
            voice
          sparse-checkout-cone-mode: false
          path: _voxply_desktop

      - name: Place voice crate at workspace-relative path
        run: |
          parent="$(dirname "$GITHUB_WORKSPACE")"
          mkdir -p "$parent/desktop"
          cp -r "$GITHUB_WORKSPACE/_voxply_desktop/voice" "$parent/desktop/voice"
          cat > "$parent/desktop/Cargo.toml" <<'WORKSPACE_EOF'
          [workspace]
          resolver = "2"
          members = ["voice"]

          [workspace.dependencies]
          tokio = { version = "1", features = ["full"] }
          tracing = "0.1"
          tracing-subscriber = "0.3"
          anyhow = "1"
          WORKSPACE_EOF

      - name: Fetch canonical shared packages (Voxply-web)
        uses: actions/checkout@v6
        with:
          repository: Voxply/Voxply-web
          sparse-checkout: |
            i18n
            utils
          sparse-checkout-cone-mode: false
          path: _voxply_web

      - name: Check vendored i18n/utils have not drifted
        run: sh scripts/check-vendored.sh _voxply_web

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
        with:
          packages: >-
            build-tools;36.1.0
            platforms;android-36
            ndk;27.0.12077973

      - name: Set up Rust (stable, Android targets)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: aarch64-linux-android,armv7-linux-androideabi
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: android/src-tauri

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            android/package-lock.json
            voxply-desktop/package-lock.json
            voxply-web/package-lock.json

      - name: Restore Gradle cache
        id: gradle-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/src-tauri/gen/android/gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install npm dependencies (android)
        working-directory: android
        run: npm install

      - name: Install npm dependencies (voxply-desktop)
        working-directory: voxply-desktop
        run: npm install --legacy-peer-deps

      - name: Install npm dependencies (voxply-web)
        working-directory: voxply-web
        run: npm install

      - name: TypeScript check
        working-directory: android
        run: npx tsc --noEmit

      - name: vitest (voxply-web)
        working-directory: voxply-web
        run: npm test

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: cargo clippy (voxply-desktop)
        run: cargo clippy -p voxply-desktop -- -D warnings

      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/voxply.keystore

      - name: Generate Android project
        working-directory: android
        run: npx tauri android init

      - name: Build APK
        working-directory: android
        run: >-
          npx tauri android build
          --target aarch64
          --target armv7
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && '/tmp/voxply.keystore' || '' }}
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: voxply
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Save Gradle cache
        if: steps.gradle-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/src-tauri/gen/android/gradle*') }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
