<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wavvon stream</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    user-select: none;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  #placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.45);
    font-size: 13px;
    pointer-events: none;
  }

  #close-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 3px 7px;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }

  body:hover #close-btn {
    opacity: 1;
  }

  #close-btn:hover {
    background: rgba(0, 0, 0, 0.8);
  }

  #drag-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 28px;
    cursor: move;
    -webkit-app-region: drag;
  }
</style>
</head>
<body>
  <div id="drag-bar"></div>
  <video id="video" autoplay playsinline muted></video>
  <div id="placeholder">No stream</div>
  <button id="close-btn" title="Close">&#x2715;</button>

<script>
(async () => {
  const { listen, emit } = window.__TAURI__.event;

  const video = document.getElementById("video");
  const placeholder = document.getElementById("placeholder");
  const closeBtn = document.getElementById("close-btn");

  let mediaSource = null;
  let sourceBuffer = null;
  const queue = [];
  let busy = false;

  function showPlaceholder(visible) {
    placeholder.style.display = visible ? "flex" : "none";
    video.style.display = visible ? "none" : "block";
  }

  showPlaceholder(true);

  function drainQueue() {
    if (!sourceBuffer || busy || queue.length === 0) return;
    const chunk = queue.shift();
    busy = true;
    try {
      sourceBuffer.appendBuffer(chunk);
    } catch {
      busy = false;
      drainQueue();
    }
  }

  function resetMse() {
    if (mediaSource && mediaSource.readyState === "open") {
      try { mediaSource.endOfStream(); } catch {}
    }
    if (video.src && video.src.startsWith("blob:")) {
      URL.revokeObjectURL(video.src);
    }
    mediaSource = null;
    sourceBuffer = null;
    queue.length = 0;
    busy = false;
  }

  function initMse() {
    resetMse();
    mediaSource = new MediaSource();
    const objectUrl = URL.createObjectURL(mediaSource);
    video.src = objectUrl;

    mediaSource.addEventListener("sourceopen", () => {
      try {
        const mimeType = MediaSource.isTypeSupported("video/webm; codecs=vp9,opus")
          ? "video/webm; codecs=vp9,opus"
          : "video/webm";
        sourceBuffer = mediaSource.addSourceBuffer(mimeType);
        sourceBuffer.addEventListener("updateend", () => {
          busy = false;
          drainQueue();
        });
      } catch {}
    }, { once: true });

    video.play().catch(() => {});
    showPlaceholder(false);
  }

  await listen("pip-stream-chunk", (event) => {
    const bytes = new Uint8Array(event.payload.data);
    if (!mediaSource || mediaSource.readyState !== "open") {
      initMse();
      queue.push(bytes.buffer);
      return;
    }
    queue.push(bytes.buffer);
    drainQueue();
  });

  await listen("pip-stream-stop", () => {
    resetMse();
    video.src = "";
    video.load();
    showPlaceholder(true);
  });

  closeBtn.addEventListener("click", async () => {
    await emit("pip-close", null);
  });
})();
</script>
</body>
</html>
