name: Build check

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'

jobs:
  check-desktop:
    name: Desktop — typecheck + build + Rust
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Linux system deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libgtk-3-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libasound2-dev libopus-dev

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm --filter voxply-desktop exec tsc --noEmit

      - name: vitest
        run: pnpm --filter voxply-desktop test

      - name: Desktop vite build
        run: pnpm --filter voxply-desktop build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test
        run: cargo test --workspace

  check-web:
    name: Web — typecheck + build + i18n
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm --filter voxply-web exec tsc --noEmit

      - name: vitest
        run: pnpm --filter voxply-web test

      - name: Web vite build
        run: pnpm --filter voxply-web build

      - name: i18n coverage check
        run: pnpm --filter voxply-web run check-i18n

  check-android:
    name: Android — typecheck + Rust check
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm --filter voxply-android exec tsc --noEmit

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: apps/android/android/src-tauri

      - name: cargo fmt check (android workspace)
        working-directory: apps/android
        run: cargo fmt --all -- --check

      - name: cargo check (android workspace)
        working-directory: apps/android
        run: cargo check --workspace
