name: Build check
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: voxply-desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GTK/WebKit system libraries (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libjavascriptcoregtk-4.1-dev
      - name: Cargo check
        run: cargo check --workspace
      - name: Install npm deps
        working-directory: voxply-desktop
        run: npm ci
      - name: TypeScript check
        working-directory: voxply-desktop
        run: npx tsc --noEmit
