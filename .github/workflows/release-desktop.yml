name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  changelog:
    name: Create release with changelog
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Generate release notes (current tag only)
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          body_path: CHANGES.md
          prerelease: ${{ contains(github.ref_name, '-') }}

  build:
    name: Build ${{ matrix.platform }}
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: --bundles appimage
            artifact: "*.AppImage"
            platform-key: linux
          - platform: windows-latest
            args: --bundles nsis
            artifact: "*.exe"
            platform-key: windows
          - platform: macos-latest
            # macos bundle produces the .app.tar.gz required by the updater
            # "app" is the .app bundle (tauri CLI has no "macos" bundle value);
            # with createUpdaterArtifacts it also produces the .app.tar.gz + .sig
            args: --target universal-apple-darwin --bundles dmg,app
            artifact: "*.dmg"
            platform-key: macos

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libgtk-3-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libasound2-dev libopus-dev

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build universal libopus (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          set -euo pipefail

          # Install build tools and arm64 Opus via Homebrew
          brew install autoconf automake libtool pkg-config opus

          # Grab the arm64 static library that Homebrew just installed
          ARM64_LIB="$(brew --prefix opus)/lib/libopus.a"

          # Get the Opus version Homebrew installed so we download matching source
          OPUS_VERSION=$(brew list --versions opus | awk '{print $2}')

          # Download matching Opus source for x86_64 cross-compilation
          curl -fsSL "https://downloads.xiph.org/releases/opus/opus-${OPUS_VERSION}.tar.gz" \
            -o /tmp/opus.tar.gz
          mkdir -p /tmp/opus-x86
          tar -xzf /tmp/opus.tar.gz -C /tmp/opus-x86 --strip-components=1

          # Cross-compile for x86_64
          cd /tmp/opus-x86
          ./configure \
            --host=x86_64-apple-darwin \
            CFLAGS="-arch x86_64 -target x86_64-apple-macos12" \
            LDFLAGS="-arch x86_64 -target x86_64-apple-macos12" \
            --enable-static --disable-shared \
            --disable-doc --disable-extra-programs --with-pic
          make -j4

          # opus's autotools layout varies by version; locate the static lib
          X86_LIB=$(find /tmp/opus-x86 -name libopus.a | head -1)
          if [ -z "$X86_LIB" ]; then echo "x86_64 libopus.a not found"; exit 1; fi

          # Lipo into a fat universal library
          mkdir -p /tmp/opus-universal/lib
          lipo -create "$ARM64_LIB" "$X86_LIB" \
            -output /tmp/opus-universal/lib/libopus.a

          # Verify
          lipo -info /tmp/opus-universal/lib/libopus.a

          # Point audiopus_sys to the fat library; skip pkg-config and build-from-source
          echo "OPUS_LIB_DIR=/tmp/opus-universal/lib" >> "$GITHUB_ENV"
          echo "OPUS_STATIC=1"                        >> "$GITHUB_ENV"
          echo "LIBOPUS_NO_PKG=1"                     >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # Windows Authenticode signing is deferred until the project has the
      # popularity to qualify for (or justify paying for) a signing service --
      # see docs/code-signing.md in the docs repo. Installers ship unsigned.
      - name: Tauri build
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # The updater overlay enables createUpdaterArtifacts (.sig + macOS
        # .app.tar.gz) only in CI, so local builds do not require the signing key.
        run: pnpm tauri build --config src-tauri/tauri.updater.conf.json ${{ matrix.args }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          fail_on_unmatched_files: true
          files: |
            target/**/release/bundle/**/${{ matrix.artifact }}

      - name: Upload macOS updater bundle to GitHub Release
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          fail_on_unmatched_files: true
          files: |
            target/**/release/bundle/macos/*.app.tar.gz

      # Collect the updater signature and bundle URL for latest.json assembly.
      - name: Collect update metadata (Linux / macOS)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            SIG_FILE=$(find target -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
            BUNDLE=$(find target -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          else
            SIG_FILE=$(find target -name "*.AppImage.sig" 2>/dev/null | head -1)
            BUNDLE=$(find target -name "*.AppImage" ! -name "*.sig" 2>/dev/null | head -1)
          fi
          FILENAME=$(basename "$BUNDLE")
          URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME/$FILENAME"
          node -e "
            const fs = require('fs');
            const sig = fs.readFileSync('$SIG_FILE', 'utf8').trim();
            process.stdout.write(JSON.stringify({url: '$URL', signature: sig}));
          " > ${{ matrix.platform-key }}.json

      - name: Collect update metadata (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $sigFile = Get-ChildItem -Path "target" -Recurse -Filter "*.exe.sig" | Select-Object -First 1
          $exeFile = Get-ChildItem -Path "target" -Recurse -Filter "*.exe" |
            Where-Object { $_.Extension -eq ".exe" -and $_.Name -notlike "*.sig" } |
            Select-Object -First 1
          $signature = (Get-Content $sigFile.FullName -Raw).Trim()
          $filename = $exeFile.Name
          $url = "https://github.com/$($env:GITHUB_REPOSITORY)/releases/download/$($env:GITHUB_REF_NAME)/$filename"
          @{url=$url;signature=$signature} | ConvertTo-Json -Compress |
            Out-File -FilePath windows.json -Encoding utf8NoBOM

      - name: Upload update metadata artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: update-meta-${{ matrix.platform-key }}
          path: ${{ matrix.platform-key }}.json
          retention-days: 1

  manifest:
    name: Publish update manifest
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download Linux metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: update-meta-linux
          path: meta

      - name: Download Windows metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: update-meta-windows
          path: meta

      - name: Download macOS metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: update-meta-macos
          path: meta

      - name: Assemble latest.json
        run: |
          node -e "
            const fs = require('fs');
            const linux = JSON.parse(fs.readFileSync('meta/linux.json', 'utf8'));
            const windows = JSON.parse(fs.readFileSync('meta/windows.json', 'utf8'));
            const mac = JSON.parse(fs.readFileSync('meta/macos.json', 'utf8'));
            const tag = process.env.GITHUB_REF_NAME;
            const manifest = {
              version: tag.replace(/^v/, ''),
              notes: '',
              pub_date: new Date().toISOString(),
              platforms: {
                'linux-x86_64': linux,
                'windows-x86_64': windows,
                'darwin-x86_64': mac,
                'darwin-aarch64': mac,
              },
            };
            fs.writeFileSync('latest.json', JSON.stringify(manifest, null, 2));
            console.log('Manifest written for', tag);
          "

      - name: Upload latest.json to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: latest.json
