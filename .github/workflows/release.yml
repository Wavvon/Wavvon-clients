name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: --bundles appimage
            artifact: "*.AppImage"
          - platform: windows-latest
            args: --bundles nsis
            artifact: "*.exe"
          - platform: macos-latest
            args: --bundles dmg --target universal-apple-darwin
            artifact: "*.dmg"

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout desktop
        uses: actions/checkout@v4
        with:
          path: desktop

      - name: Checkout web (for i18n)
        uses: actions/checkout@v4
        with:
          repository: Voxply/Voxply-web
          path: web

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/desktop/src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libgtk-3-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/desktop/package-lock.json

      - name: Install i18n deps
        working-directory: web/i18n
        run: npm install

      - name: Install JS deps
        working-directory: desktop/desktop
        run: npm ci

      - name: Tauri build
        working-directory: desktop/desktop
        env:
          # Required to sign auto-update payloads.
          # Add TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          # to repository secrets (Settings -> Secrets -> Actions).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build ${{ matrix.args }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/desktop/src-tauri/target/release/bundle/**/${{ matrix.artifact }}