name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: --bundles appimage
            artifact: "*.AppImage"
          - platform: windows-latest
            args: --bundles nsis
            artifact: "*.exe"
          - platform: macos-latest
            args: --target universal-apple-darwin --bundles dmg
            artifact: "*.dmg"

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout desktop
        uses: actions/checkout@v6
        with:
          path: desktop

      - name: Checkout web (for i18n)
        uses: actions/checkout@v6
        with:
          repository: Voxply/Voxply-web
          path: web

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/desktop/src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libgtk-3-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libasound2-dev libopus-dev

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build universal libopus (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          set -euo pipefail

          # Install build tools and arm64 Opus via Homebrew
          brew install autoconf automake libtool pkg-config opus

          # Grab the arm64 static library that Homebrew just installed
          ARM64_LIB="$(brew --prefix opus)/lib/libopus.a"

          # Get the Opus version Homebrew installed so we download matching source
          OPUS_VERSION=$(brew list --versions opus | awk '{print $2}')

          # Download matching Opus source for x86_64 cross-compilation
          curl -fsSL "https://downloads.xiph.org/releases/opus/opus-${OPUS_VERSION}.tar.gz" \
            -o /tmp/opus.tar.gz
          mkdir -p /tmp/opus-x86
          tar -xzf /tmp/opus.tar.gz -C /tmp/opus-x86 --strip-components=1

          # Cross-compile for x86_64
          cd /tmp/opus-x86
          ./configure \
            --host=x86_64-apple-darwin \
            CFLAGS="-arch x86_64 -target x86_64-apple-macos12" \
            LDFLAGS="-arch x86_64 -target x86_64-apple-macos12" \
            --enable-static --disable-shared \
            --disable-doc --disable-extra-programs --with-pic
          make -j4

          X86_LIB="/tmp/opus-x86/lib/.libs/libopus.a"

          # Lipo into a fat universal library
          mkdir -p /tmp/opus-universal/lib
          lipo -create "$ARM64_LIB" "$X86_LIB" \
            -output /tmp/opus-universal/lib/libopus.a

          # Verify
          lipo -info /tmp/opus-universal/lib/libopus.a

          # Point audiopus_sys to the fat library; skip pkg-config and build-from-source
          echo "OPUS_LIB_DIR=/tmp/opus-universal/lib" >> "$GITHUB_ENV"
          echo "OPUS_STATIC=1"                        >> "$GITHUB_ENV"
          echo "LIBOPUS_NO_PKG=1"                     >> "$GITHUB_ENV"

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/desktop/package-lock.json

      - name: Install JS deps
        working-directory: desktop/desktop
        run: npm ci

      - name: Sign inner binary (Windows)
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERT_THUMBPRINT != ''
        env:
          WINDOWS_CERT_THUMBPRINT: ${{ secrets.WINDOWS_CERT_THUMBPRINT }}
          SIGNING_HSM_CREDENTIALS: ${{ secrets.SIGNING_HSM_CREDENTIALS }}
        shell: pwsh
        run: |
          $exePath = "desktop\desktop\src-tauri\target\release\voxply.exe"
          if (Test-Path $exePath) {
            signtool sign /fd sha256 /tr http://timestamp.sectigo.com /td sha256 `
              /sha1 $env:WINDOWS_CERT_THUMBPRINT $exePath
            Write-Output "Signed: $exePath"
          } else {
            Write-Output "Binary not yet built, will sign installer instead"
          }

      - name: Tauri build
        working-directory: desktop/desktop
        env:
          # Required to sign auto-update payloads.
          # Add TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          # to repository secrets (Settings -> Secrets -> Actions).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build ${{ matrix.args }}

      - name: Sign installer (Windows)
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERT_THUMBPRINT != ''
        env:
          WINDOWS_CERT_THUMBPRINT: ${{ secrets.WINDOWS_CERT_THUMBPRINT }}
          SIGNING_HSM_CREDENTIALS: ${{ secrets.SIGNING_HSM_CREDENTIALS }}
        shell: pwsh
        run: |
          $installer = Get-ChildItem "desktop\desktop\src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1
          if ($installer) {
            signtool sign /fd sha256 /tr http://timestamp.sectigo.com /td sha256 `
              /sha1 $env:WINDOWS_CERT_THUMBPRINT $installer.FullName
            Write-Output "Signed: $($installer.FullName)"
            signtool verify /pa /v $installer.FullName
            Write-Output "Verification passed"
          } else {
            Write-Output "No NSIS installer found to sign"
          }

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            desktop/desktop/src-tauri/target/release/bundle/**/${{ matrix.artifact }}