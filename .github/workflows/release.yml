name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  release:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: voxply-desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GTK/WebKit system libraries (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libjavascriptcoregtk-4.1-dev
      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked
      - name: Install npm deps
        working-directory: voxply-desktop
        run: npm ci
      - name: Build
        working-directory: voxply-desktop
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voxply-${{ matrix.os }}-${{ github.ref_name }}
          path: |
            voxply-desktop/src-tauri/target/release/bundle/**/*.exe
            voxply-desktop/src-tauri/target/release/bundle/**/*.msi
            voxply-desktop/src-tauri/target/release/bundle/**/*.AppImage
            voxply-desktop/src-tauri/target/release/bundle/**/*.deb
